name: MLflow CI Advanced

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11.2
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.2"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib joblib PyYAML seaborn dagshub
      
      - name: Clean up old MLflow runs
        run: rm -rf mlruns/ MLProject/mlruns/
      
      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local

      - name: DEBUG - Show what was created
        run: |
          echo "=== MLProject directory contents ==="
          ls -la MLProject/
          echo "=== Model directory ==="
          ls -la MLProject/model/ || echo "No model directory"
          echo "=== mlruns directory ==="
          ls -la mlruns/ || echo "No mlruns at root"
          ls -la MLProject/mlruns/ || echo "No mlruns in MLProject"

      - name: Get latest MLflow run_id
        id: latest-run
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import yaml

          # Check both possible mlruns locations
          mlruns_path = Path("mlruns")
          if not mlruns_path.exists():
              mlruns_path = Path("MLProject/mlruns")
          
          if not mlruns_path.exists():
              print("No mlruns directory found")
              exit(0)

          candidates = []
          for meta_path in mlruns_path.glob("*/*/meta.yaml"):
              if "models" in meta_path.parts or "datasets" in meta_path.parts:
                  continue
              with meta_path.open() as file:
                  meta = yaml.safe_load(file)
              candidates.append((meta.get("start_time", 0), meta.get("run_id")))

          if candidates:
              run_id = sorted(candidates)[-1][1]
              with open(os.environ["GITHUB_OUTPUT"], "a") as output:
                  output.write(f"run_id={run_id}\n")
              print(f"Latest run_id: {run_id}")
          else:
              print("No MLflow run_id found")
          PY

      - name: Upload to GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            MLProject/model/
            MLProject/mlruns/
            mlruns/
          if-no-files-found: warn

  build-docker:
    runs-on: ubuntu-latest
    needs: train-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download MLflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: ./artifacts
      
      - name: DEBUG - Complete artifact structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== List all files in artifacts ==="
          find ./artifacts -type f
          echo "=== List all directories in artifacts ==="
          find ./artifacts -type d
          echo "=== Search for model related files ==="
          find ./artifacts -name "*.pkl" -o -name "model" -type d
      
      - name: Find and copy model to standard location
        run: |
          # Try multiple possible model locations
          MODEL_PATH=""
          
          # Check different possible paths
          if [ -d "artifacts/model" ]; then
            MODEL_PATH="artifacts/model"
          elif [ -d "artifacts/MLProject/model" ]; then
            MODEL_PATH="artifacts/MLProject/model"
          elif [ -d "artifacts/mlruns" ]; then
            MODEL_PATH=$(find artifacts/mlruns -name "model" -type d | head -1)
          fi
          
          if [ -z "$MODEL_PATH" ] || [ ! -d "$MODEL_PATH" ]; then
            echo "ERROR: Model not found in artifacts!"
            echo "Full artifact contents:"
            find artifacts -type d
            exit 1
          fi
          
          echo "Found model at: $MODEL_PATH"
          # Copy to root/model for Docker
          mkdir -p model
          cp -r $MODEL_PATH/* model/
          echo "=== Model directory contents ==="
          ls -la model/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          echo "=== Model directory before Docker build ==="
          ls -la model/
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-model:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/churn-model:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-model:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:latest

      - name: Save image digest
        run: |
          docker inspect ${{ secrets.DOCKER_USERNAME }}/churn-model:latest --format='{{index .RepoDigests 0}}' > image_digest.txt

      - name: Upload Docker image info
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-info
          path: image_digest.txt
          retention-days: 7

  upload-monitoring-files:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Prometheus config
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-config
          path: prometheus.yml
          retention-days: 30

      - name: Upload Prometheus exporter
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-exporter
          path: prometheus_exporter.py
          retention-days: 30

      - name: Upload test script
        uses: actions/upload-artifact@v4
        with:
          name: test-script
          path: test_model.py
          retention-days: 30
