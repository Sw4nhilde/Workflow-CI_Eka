name: MLflow CI Advanced

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11.2
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.2"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib joblib PyYAML seaborn dagshub
      
      - name: Clean up old MLflow runs
        run: rm -rf mlruns/
      
      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        id: latest-run
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import yaml

          candidates = []
          for meta_path in Path("mlruns").glob("*/*/meta.yaml"):
              if "models" in meta_path.parts or "datasets" in meta_path.parts:
                  continue
              with meta_path.open() as file:
                  meta = yaml.safe_load(file)
              candidates.append((meta.get("start_time", 0), meta.get("run_id")))

          if not candidates:
              raise SystemExit("No MLflow run_id found.")

          run_id = sorted(candidates)[-1][1]
          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              output.write(f"run_id={run_id}\n")
          print(f"Latest run_id: {run_id}")
          PY

      - name: Upload to GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            mlruns/

  
  build-docker:
    runs-on: ubuntu-latest
    needs: train-build-push
    if: github.ref == 'refs/heads/main'
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Download MLflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: ./artifacts
  
      - name: Debug - List downloaded files
        run: |
          echo "=== Artifacts directory ==="
          ls -la artifacts/
          echo "=== Find everything ==="
          find artifacts/ -type f | head -20
          echo "=== Find model directories ==="
          find artifacts/ -name "model" -type d
  
      - name: Copy model to standard location
        run: |
          # Try different possible model locations
          if [ -d "artifacts/model" ]; then
            echo "Model found in artifacts/model"
            cp -r artifacts/model/* model/
          elif [ -d "artifacts/MLProject/model" ]; then
            echo "Model found in artifacts/MLProject/model"
            cp -r artifacts/MLProject/model/* model/
          elif [ -d "artifacts/mlruns" ]; then
            echo "Looking for model in mlruns"
            MODEL_PATH=$(find artifacts/mlruns -name "model" -type d | head -1)
            if [ -n "$MODEL_PATH" ]; then
              cp -r $MODEL_PATH/* model/
            fi
          else
            echo "ERROR: Model not found!"
            echo "Full directory structure:"
            find artifacts/ -type d
            exit 1
          fi
          
          echo "=== Model directory contents ==="
          ls -la model/ || echo "Model directory empty!"
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
  
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-model:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/churn-model:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-model:latest
  
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:latest
  
      - name: Save image digest
        run: |
          docker inspect ${{ secrets.DOCKER_USERNAME }}/churn-model:latest --format='{{index .RepoDigests 0}}' > image_digest.txt
  
      - name: Upload Docker image info
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-info
          path: image_digest.txt
          retention-days: 7


  upload-monitoring-files:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Prometheus config
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-config
          path: prometheus.yml
          retention-days: 30

      - name: Upload Prometheus exporter
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-exporter
          path: prometheus_exporter.py
          retention-days: 30

      - name: Upload test script
        uses: actions/upload-artifact@v4
        with:
          name: test-script
          path: test_model.py
          retention-days: 30
